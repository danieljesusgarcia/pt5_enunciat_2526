<!DOCTYPE html>
<html lang="ca">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TodoList — Editar tasca</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-50 min-h-screen font-sans text-slate-800">

    <!-- Navbar -->
    <nav class="bg-white border-b border-slate-200 shadow-sm sticky top-0 z-10">
        <div class="max-w-7xl mx-auto px-6 h-14 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <svg class="w-6 h-6 text-indigo-600" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
                <a th:href="@{/}" class="font-semibold text-slate-900 text-lg tracking-tight hover:text-indigo-600 transition-colors">TodoList</a>
            </div>
            <a th:href="@{/}" class="inline-flex items-center gap-1.5 text-sm text-slate-600 hover:text-slate-900 transition-colors">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
                </svg>
                Torna a la llista
            </a>
        </div>
    </nav>

    <!-- Contingut -->
    <div class="max-w-2xl mx-auto px-6 py-10">

        <!-- Error banner -->
        <div th:if="${errorMessage}" class="flex items-center gap-3 bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg text-sm mb-6">
            <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
            <span th:text="${errorMessage}"></span>
        </div>

        <!-- Formulari -->
        <div class="bg-white border border-slate-200 rounded-xl shadow-sm p-8">
            <div class="mb-6">
                <h1 class="text-xl font-semibold text-slate-900">Editar tasca</h1>
                <p class="text-sm text-slate-500 mt-1">Modifica els camps i desa els canvis.</p>
            </div>

            <form id="edit_tasca" th:action="@{/tasques/update/{id}(id=${tasca.id})}" th:object="${tasca}" method="post" class="space-y-5">

                <div>
                    <label for="descripcio" class="block text-sm font-medium text-slate-700 mb-1.5">Descripció <span class="text-rose-500">*</span></label>
                    <input type="text" id="descripcio" th:field="*{descripcio}"
                           class="w-full px-3 py-2.5 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-indigo-400 transition-colors bg-slate-50"/>
                </div>

                <!-- Checkbox completada -->
                <div class="flex items-center gap-3 bg-emerald-50 border border-emerald-200 px-4 py-3 rounded-lg">
                    <input type="checkbox" id="completada" th:field="*{completada}"
                           class="w-4 h-4 accent-emerald-600 rounded"/>
                    <label for="completada" class="text-sm font-medium text-emerald-800 cursor-pointer">Marcar com a completada</label>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label for="dataInici" class="block text-sm font-medium text-slate-700 mb-1.5">Data d'inici</label>
                        <input type="date" id="dataInici" th:field="*{dataInici}"
                               class="w-full px-3 py-2.5 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-indigo-400 transition-colors bg-slate-50"/>
                    </div>
                    <div>
                        <label for="dataFiPrevista" class="block text-sm font-medium text-slate-700 mb-1.5">Data fi prevista</label>
                        <input type="date" id="dataFiPrevista" th:field="*{dataFiPrevista}"
                               class="w-full px-3 py-2.5 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-indigo-400 transition-colors bg-slate-50"/>
                    </div>
                </div>

                <div>
                    <label for="dataFiReal" class="block text-sm font-medium text-slate-700 mb-1.5">
                        Data fi real
                        <span class="ml-1 text-xs font-normal text-slate-400">(calculada automàticament)</span>
                    </label>
                    <input type="date" id="dataFiReal" th:field="*{dataFiReal}" readonly
                           class="w-full px-3 py-2.5 border border-slate-200 rounded-lg text-sm bg-slate-100 text-slate-500 cursor-not-allowed"/>
                </div>

                <div class="w-40">
                    <label for="prioritat" class="block text-sm font-medium text-slate-700 mb-1.5">Prioritat <span class="text-slate-400 font-normal">(1–5)</span></label>
                    <input type="number" id="prioritat" th:field="*{prioritat}" min="1" max="5"
                           class="w-full px-3 py-2.5 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-indigo-400 transition-colors bg-slate-50"/>
                </div>

                <div class="flex items-center justify-between pt-2">
                    <button type="submit"
                            class="inline-flex items-center gap-2 bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium px-5 py-2.5 rounded-lg transition-colors">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
                        </svg>
                        Desar canvis
                    </button>
                    <a th:href="@{/}" class="text-sm text-slate-500 hover:text-slate-700 transition-colors">Cancel·lar</a>
                </div>
            </form>
        </div>
    </div>

</body>
</html>
